<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Movie Mania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" style="text-align: center; margin-bottom: 1rem;"><i class="fas fa-film"></i> MOVIE MANIA</div>
            <h2>Welcome Back</h2>
            <p style="text-align: center; color: #888; margin-bottom: 1.5rem;">Sign in to continue</p>
            <div id="errorMsg" style="color: #e50914; text-align: center; margin-bottom: 1rem;"></div>
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="admin@moviemania.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="••••••"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>
            <div style="background: rgba(229,9,20,0.1); border: 1px solid #e50914; border-radius: 12px; padding: 1rem; margin-top: 1.5rem; font-size: 0.8rem;">
                <strong>Demo Accounts:</strong><br>
                Admin: admin@moviemania.com / admin123<br>
                User: user@example.com / user123
            </div>
            <div style="text-align: center; margin-top: 1.5rem; color: #888;">Don't have an account? <a href="/register.html" style="color: #e50914;">Create Account</a></div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (data.success) { localStorage.setItem('movieManiaUser', JSON.stringify(data.user)); window.location.href = '/index.html'; }
                else { document.getElementById('errorMsg').innerText = data.error || 'Login failed'; }
            } catch(e) { document.getElementById('errorMsg').innerText = 'Connection error'; }
        });
    </script>
</body>
</html>

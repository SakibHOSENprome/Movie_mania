<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Movie Mania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" style="text-align: center; margin-bottom: 1rem;"><i class="fas fa-film"></i> MOVIE MANIA</div>
            <h2>Create Account</h2>
            <p style="text-align: center; color: #888; margin-bottom: 1.5rem;">Join the community</p>
            <div id="errorMsg" style="color: #e50914; text-align: center; margin-bottom: 1rem;"></div>
            <form id="registerForm">
                <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem; color: #888;">Already have an account? <a href="/login.html" style="color: #e50914;">Sign In</a></div>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) { document.getElementById('errorMsg').innerText = 'Passwords do not match'; return; }
            try {
                const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('username').value, email: document.getElementById('email').value, password }) });
                const data = await res.json();
                if (data.success) { alert('Registration successful! Please login.'); window.location.href = '/login.html'; }
                else { document.getElementById('errorMsg').innerText = data.error; }
            } catch(e) { document.getElementById('errorMsg').innerText = 'Connection error'; }
        });
    </script>
</body>
</html>
